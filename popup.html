<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            width: 300px;
            padding: 20px;
            font-family: Arial, sans-serif;
            background: #f0f0f0;
        }
        #btn {
            width: 100%;
            padding: 12px;

            color: white;

            border-radius: 5px;

        }
        #status {
            margin-top: 15px;
            padding: 10px;
            background: white;
            border-radius: 5px;
            text-align: center;
            display: none;
        }
    </style>
</head>
<body>
    <h2>📍 Google Maps Scraper</h2>
    <button id="btn">🚀 Extract & Download</button>
    <div id="status"></div>
