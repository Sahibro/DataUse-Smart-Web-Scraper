<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 320px; font-family: 'Segoe UI', sans-serif; padding: 15px; background: #ffffff; }
    .card { border: 1px solid #ddd; padding: 15px; border-radius: 10px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    #count { font-size: 36px; font-weight: bold; color: #1a73e8; margin: 10px 0; }
    button { width: 100%; padding: 12px; margin: 5px 0; cursor: pointer; border: none; border-radius: 6px; font-weight: bold; font-size: 14px; }
    #startBtn { background: #34a853; color: white; }
    #stopBtn { background: #ea4335; color: white; display: none; }
    #downloadBtn { background: #1a73e8; color: white; margin-top: 10px; display: none; }
    .status { font-size: 12px; color: #666; margin-bottom: 5px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="status" id="statusText">Ready to start</div>
    <div id="count">0</div>
    <div style="font-size: 12px; color: #888;">Unique Leads Found</div>
    <button id="startBtn">START SCRAPING</button>
    <button id="stopBtn">STOP SCRAPING</button>
    <button id="downloadBtn">DOWNLOAD CSV (EXCEL)</button>
  </div>
  <script src="popup.js"></script>
</body>
</html>
