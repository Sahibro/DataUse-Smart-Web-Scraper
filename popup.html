<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 350px; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; background: #ffffff; }
    .header { background: #1a73e8; color: white; padding: 15px; text-align: center; margin: -15px -15px 15px -15px; }
    .stats { display: flex; justify-content: space-around; background: #f8f9fa; padding: 10px; border-radius: 8px; border: 1px solid #eee; }
    .stat-box { text-align: center; }
    #count { font-size: 24px; font-weight: bold; color: #1a73e8; }
    button { 
      width: 100%; padding: 12px; margin: 8px 0; border: none; border-radius: 5px; 
      font-weight: 600; cursor: pointer; font-size: 14px; transition: 0.3s;
    }
    #startBtn { background: #34a853; color: white; }
    #stopBtn { background: #d93025; color: white; display: none; }
    #downloadBtn { background: white; color: #1a73e8; border: 1px solid #1a73e8; display: none; }
    #downloadBtn:hover { background: #e8f0fe; }
    .status-text { font-size: 12px; color: #666; text-align: center; margin-top: 5px; }
  </style>
</head>
<body>
  <div class="header"><h3 style="margin:0">Lead Extractor</h3></div>
  <div class="stats">
    <div class="stat-box"><div id="count">0</div><div>Leads</div></div>
    <div class="stat-box"><div id="status" style="font-weight:bold; color: #fbbc04; margin-top: 8px;">Ready</div><div>Status</div></div>
  </div>
  <button id="startBtn">START SCRAPING</button>
  <button id="stopBtn">STOP & SAVE</button>
  <button id="downloadBtn">DOWNLOAD CSV (EXCEL)</button>
  <div class="status-text">Open Google Maps and Search first</div>
  <script src="popup.js"></script>
</body>
</html>
