<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DataUse Smart Scraper</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            width: 300px;
            padding: 20px;
            background-color: #f4f7f6;
            margin: 0;
            text-align: center;
        }
        .container {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h2 {
            color: #2c3e50;
            font-size: 18px;
            margin-bottom: 10px;
        }
        p {
            font-size: 12px;
            color: #7f8c8d;
            margin-bottom: 20px;
        }
        #btn {
            background-color: #27ae60;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            width: 100%;
            transition: background 0.3s ease;
        }
        #btn:hover {
            background-color: #219150;
        }
        .footer {
            margin-top: 15px;
            font-size: 10px;
            color: #bdc3c7;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>DataUse Scraper 🚀</h2>
        <p>Google Maps से बिज़नेस लीड्स निकालें और CSV डाउनलोड करें।</p>
        <!-- सुनिश्चित करें कि ID 'btn' ही रहे -->
        <button id="btn">Start Scraping</button>
        <div class="footer">Verified Lead Generation Tool</div>
    </div>
    <!-- सुनिश्चित करें कि फाइल का नाम popup.js ही हो -->
    <script src="popup.js"></script>
</body>
</html>
