<!DOCTYPE html>
<html>
<head>
    <style>
        body { width: 280px; padding: 20px; font-family: 'Segoe UI', Tahoma, sans-serif; text-align: center; background: #f9f9f9; }
        .card { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { color: #2c3e50; font-size: 18px; margin-bottom: 15px; }
        #btn { background: #27ae60; color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; font-size: 14px; transition: 0.3s; }
        #btn:hover { background: #219150; transform: translateY(-2px); }
        .status { margin-top: 10px; font-size: 11px; color: #7f8c8d; }
    </style>
</head>
<body>
    <div class="card">
        <h2>DataUse Scraper PRO 🚀</h2>
        <button id="btn">Extract Business Leads</button>
        <div class="status">Google Maps पर सर्च करने के बाद क्लिक करें</div>
    </div>
    <script src="popup.js"></script>
</body>
</html>
