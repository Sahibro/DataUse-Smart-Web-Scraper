<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 320px; font-family: 'Segoe UI', sans-serif; padding: 15px; background: #fff; }
    .main-box { border: 1px solid #eee; padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; }
    #count { font-size: 40px; font-weight: bold; color: #1a73e8; margin: 10px 0; }
    .label { font-size: 12px; color: #777; margin-bottom: 15px; }
    button { width: 100%; padding: 12px; margin: 5px 0; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; }
    #startBtn { background: #34a853; color: white; }
    #stopBtn { background: #ea4335; color: white; display: none; }
    #downloadBtn { background: #1a73e8; color: white; display: none; margin-top: 10px; }
    #status { font-size: 11px; color: #f39c12; margin-top: 5px; }
  </style>
</head>
<body>
  <div class="main-box">
    <div id="status">Ready to Scan</div>
    <div id="count">0</div>
    <div class="label">LEADS COLLECTED</div>
    <button id="startBtn">START EXTRACTION</button>
    <button id="stopBtn">STOP & SAVE</button>
    <button id="downloadBtn">DOWNLOAD CSV</button>
  </div>
  <script src="popup.js"></script>
</body>
</html>
