<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 300px; font-family: sans-serif; padding: 15px; }
    .status-box { background: #f0f0f0; padding: 10px; border-radius: 5px; margin-bottom: 10px; text-align: center; }
    #count { font-size: 24px; font-weight: bold; color: #1a73e8; }
    button { width: 100%; padding: 10px; margin: 5px 0; cursor: pointer; border-radius: 4px; border: none; font-weight: bold; }
    #startBtn { background: #34a853; color: white; }
    #stopBtn { background: #ea4335; color: white; }
    #downloadBtn { background: #1a73e8; color: white; display:none; }
  </style>
</head>
<body>
  <div class="status-box">
    <div id="count">0</div>
    <div style="font-size: 12px;">Leads Extracted</div>
  </div>
  <button id="startBtn">START SCRAPING</button>
  <button id="stopBtn">STOP & SAVE</button>
  <button id="downloadBtn">DOWNLOAD CSV</button>
  <script src="popup.js"></script>
</body>
</html>
